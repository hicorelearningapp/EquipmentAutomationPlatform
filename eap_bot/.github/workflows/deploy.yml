name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/eap_bot
            git pull origin main
            pkill -f uvicorn
            sleep 2
            nohup ./venv/bin/python -m uvicorn source.main:app --host 0.0.0.0 --port 8012 > /root/uvicorn.log 2>&1 &
